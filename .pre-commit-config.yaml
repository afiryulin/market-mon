repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-yaml
      - id: end-of-file-fixer

  # ==================== clang-format ====================
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v22.1.4
    hooks:
      - id: clang-format
        args: [--style=file, -Werror, --dry-run]
