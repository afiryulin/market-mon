syntax = "proto3";

package market.v1;

service MarketService {
  rpc GetPrice(PriceRequest) returns (PriceResponse);
  rpc SubscribePrices(SubscribeRequest) returns (stream PriceUpdate);
  rpc TradeStream(stream TradeRequest) returns (stream TradeEvent);
}

message PriceRequest { string symbol = 1; }

message PriceResponse {
  string symbol = 1;
  double price = 2;
  uint64 timestamp = 3;
}

message SubscribeRequest { /*repeated */ string symbol = 1; }

message PriceUpdate {
  string symbol = 1;
  double price = 2;
  uint64 timestamp = 3;
}

message TradeRequest {
  string symbol = 1;
  double quantity = 2;
  bool is_buy = 3;
}

message TradeEvent {
  string symbol = 1;
  double price = 2;
  string status = 3;
}