name: C++ Linux Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/market-mon/ci-base:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check formatting
      run: |
        find client server proto common \( -name "*.cpp" -o -name "*.h" \) -exec clang-format-20 --dry-run -Werror --style=file {} +

    - name: Configure CMake
      run: cmake -S . -B ${{github.workspace}}/build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCPM_USE_LOCAL_PACKAGES=ON

    - name: Compile proto files
      run: cmake --build ${{github.workspace}}/build --target market_proto

    - name: Run Linter (Clang-Tidy)
      run: |
        sed -i 's|/home/runner/work/market-mon/market-mon|/work|g' build/compile_commands.json
        run-clang-tidy -p ${{ github.workspace }}/build "client/src/.*" "server/src/.*"

    - name: Build
      run: |
        cmake --build ${{github.workspace}}/build
