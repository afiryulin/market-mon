name: C++ Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake qt6-base-dev protobuf-compiler-grpc libprotobuf-dev libgrpc++-dev ninja-build

    - name: Configure CMake
      run: cmake -S . -B ${{github.workspace}}/build -G Ninja

    - name: Build
      run: |
        cmake --build ${{github.workspace}}/build -j$(nproc)

    - name: Check crush on startup
      run: |
        timeout 10s ${{github.workspace}}/build/server/market_server || [ $? eq 124 ]